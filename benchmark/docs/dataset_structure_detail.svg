<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aD" markerWidth="11" markerHeight="11" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#475569"/></marker>
    <marker id="aT" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#0e7490"/></marker>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="#f1f5f9"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1280" height="62" fill="#0f172a"/>
  <rect x="0" y="0" width="8" height="62" fill="#38bdf8"/>
  <text x="36" y="40" fill="#ffffff" font-size="24" font-weight="700">Benchmark-Datenpunkt — Aufbau und Ablauf</text>

  <!-- ===================== LEFT: WORAUS BESTEHT EIN DATENPUNKT ===================== -->
  <rect x="24" y="80" width="560" height="616" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="24" y="80" width="560" height="38" rx="12" fill="#1e3a8a"/>
  <rect x="24" y="99" width="560" height="19" fill="#1e3a8a"/>
  <text x="44" y="105" fill="#ffffff" font-size="16" font-weight="700">Woraus besteht ein Datenpunkt?</text>

  <!-- 1 EINGABE -->
  <rect x="40" y="130" width="528" height="114" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="64" cy="158" r="13" fill="#2563eb"/><text x="64" y="163" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="86" y="163" fill="#0f172a" font-size="15.5" font-weight="700">Eingabe — die Aufgabe</text>
  <g font-size="13.5" text-anchor="middle">
    <rect x="60"  y="180" width="62" height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="91"  y="197" fill="#1e40af">Text</text>
    <rect x="130" y="180" width="72" height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="166" y="197" fill="#1e40af">Skizze</text>
    <rect x="210" y="180" width="74" height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="247" y="197" fill="#1e40af">de · en</text>
    <rect x="60"  y="212" width="104" height="26" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/><text x="112" y="229" fill="#065f46">vollständig</text>
    <rect x="172" y="212" width="120" height="26" rx="6" fill="#fff7ed" stroke="#fed7aa"/><text x="232" y="229" fill="#9a3412">unvollständig</text>
  </g>

  <!-- 2 REFERENZ (mit Beispielgraph) -->
  <rect x="40" y="252" width="528" height="238" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="64" cy="280" r="13" fill="#06b6d4"/><text x="64" y="285" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="86" y="285" fill="#0f172a" font-size="15.5" font-weight="700">Referenz — die richtige Anlage</text>
  <text x="86" y="304" fill="#0e7490" font-size="12.5">Bauteile + Verbindungen (Beispiel)</text>

  <!-- edges: Gärrest (solid) -->
  <g stroke="#0e7490" stroke-width="2">
    <line x1="156" y1="337" x2="192" y2="337" marker-end="url(#aT)"/>
    <line x1="292" y1="337" x2="328" y2="337" marker-end="url(#aT)"/>
  </g>
  <!-- edges: Biogas (dashed) -->
  <g stroke="#0e7490" stroke-width="2" stroke-dasharray="5 3">
    <line x1="108" y1="354" x2="226" y2="428" marker-end="url(#aT)"/>
    <line x1="244" y1="354" x2="244" y2="428" marker-end="url(#aT)"/>
    <line x1="388" y1="354" x2="262" y2="428" marker-end="url(#aT)"/>
  </g>
  <!-- nodes -->
  <g font-size="12.5" text-anchor="middle" fill="#155e75">
    <rect x="60"  y="320" width="96"  height="34" rx="8" fill="#ecfeff" stroke="#06b6d4"/><text x="108" y="341">Fermenter</text>
    <rect x="196" y="320" width="96"  height="34" rx="8" fill="#ecfeff" stroke="#06b6d4"/><text x="244" y="341">Nachgärer</text>
    <rect x="332" y="320" width="112" height="34" rx="8" fill="#ecfeff" stroke="#06b6d4"/><text x="388" y="341">Gärrestlager</text>
    <rect x="196" y="430" width="96"  height="34" rx="8" fill="#cffafe" stroke="#0891b2"/><text x="244" y="451">BHKW</text>
  </g>
  <!-- legend -->
  <g font-size="12.5" fill="#475569">
    <line x1="332" y1="440" x2="360" y2="440" stroke="#0e7490" stroke-width="2"/><text x="366" y="444">Gärrest</text>
    <line x1="440" y1="440" x2="468" y2="440" stroke="#0e7490" stroke-width="2" stroke-dasharray="5 3"/><text x="474" y="444">Biogas</text>
  </g>

  <!-- 3 ORACLE -->
  <rect x="40" y="498" width="528" height="56" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="64" cy="526" r="13" fill="#4f46e5"/><text x="64" y="531" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="86" y="531" fill="#0f172a" font-size="15.5" font-weight="700">Oracle — beantwortet Rückfragen</text>

  <!-- 4 REGELN (interim: Variante A) -->
  <rect x="40" y="562" width="528" height="128" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="64" cy="590" r="13" fill="#d97706"/><text x="64" y="595" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">4</text>
  <text x="86" y="595" fill="#0f172a" font-size="15.5" font-weight="700">Erwartungen &amp; Verbote</text>
  <rect x="60" y="614" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="82" y="626" fill="#1e40af" font-size="12.5"><tspan font-weight="700">Erwartete Rückfragen</tspan> — was nachgefragt werden sollte</text>
  <rect x="60" y="646" width="14" height="14" rx="3" fill="#dc2626"/>
  <text x="82" y="658" fill="#991b1b" font-size="12.5"><tspan font-weight="700">Verbote</tspan> — was die KI nicht erfinden darf</text>

  <!-- ===================== RIGHT: ABLAUF ===================== -->
  <rect x="608" y="80" width="648" height="462" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="608" y="80" width="648" height="38" rx="12" fill="#0f172a"/>
  <rect x="608" y="99" width="648" height="19" fill="#0f172a"/>
  <text x="628" y="105" fill="#ffffff" font-size="16" font-weight="700">Ablauf eines Tests</text>

  <!-- edges -->
  <g stroke="#475569" stroke-width="2.5" fill="none">
    <line x1="860" y1="176" x2="860" y2="184" marker-end="url(#aD)"/>
    <polyline points="938,216 1120,216 1120,268" marker-end="url(#aD)"/>
    <line x1="860" y1="246" x2="860" y2="336" marker-end="url(#aD)"/>
    <polyline points="1120,318 1120,360 992,360" marker-end="url(#aD)"/>
    <line x1="860" y1="380" x2="860" y2="404" marker-end="url(#aD)"/>
    <line x1="860" y1="450" x2="860" y2="470" marker-end="url(#aD)"/>
  </g>
  <text x="1024" y="208" fill="#15803d" font-size="13" font-weight="700" text-anchor="middle">ja</text>
  <text x="848" y="296" fill="#475569" font-size="13" font-weight="700" text-anchor="end">nein</text>

  <!-- A -->
  <rect x="740" y="132" width="240" height="44" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="860" y="159" fill="#1e3a8a" font-size="14.5" font-weight="600" text-anchor="middle">KI erhält die Beschreibung</text>
  <!-- B diamond -->
  <polygon points="860,186 938,216 860,246 782,216" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="860" y="221" fill="#0f172a" font-size="14" font-weight="700" text-anchor="middle">KI fragt nach?</text>
  <!-- C (oracle path, rechts) -->
  <rect x="1008" y="268" width="224" height="50" rx="10" fill="#fffbeb" stroke="#d97706"/>
  <text x="1120" y="290" fill="#92400e" font-size="14" font-weight="600" text-anchor="middle">KI fragt nach –</text>
  <text x="1120" y="308" fill="#92400e" font-size="14" font-weight="600" text-anchor="middle">Oracle antwortet</text>
  <!-- D -->
  <rect x="730" y="336" width="260" height="44" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="860" y="363" fill="#1e3a8a" font-size="14.5" font-weight="600" text-anchor="middle">KI baut die Anlage</text>
  <!-- E -->
  <rect x="730" y="406" width="260" height="44" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="860" y="433" fill="#1e3a8a" font-size="14.5" font-weight="600" text-anchor="middle">Vergleich mit der Referenz</text>
  <!-- F -->
  <rect x="730" y="472" width="260" height="46" rx="10" fill="#0f172a"/>
  <text x="860" y="500" fill="#ffffff" font-size="14.5" font-weight="700" text-anchor="middle">Drei Bewertungen in Prozent</text>

  <!-- ===================== SCORES ===================== -->
  <text x="608" y="566" fill="#64748b" font-size="13" font-weight="700" letter-spacing="0.5">DREI BEWERTUNGEN (0–100 %)</text>
  <g>
    <rect x="624" y="578" width="192" height="112" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="646" y="614" fill="#065f46" font-size="18" font-weight="700">Struktur</text>
    <text x="646" y="644" fill="#047857" font-size="13">Bauteile &amp;</text>
    <text x="646" y="663" fill="#047857" font-size="13">Verbindungen</text>

    <rect x="836" y="578" width="192" height="112" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <text x="858" y="614" fill="#92400e" font-size="18" font-weight="700">Maße</text>
    <text x="858" y="644" fill="#b45309" font-size="13">Größen im</text>
    <text x="858" y="663" fill="#b45309" font-size="13">Toleranzband</text>

    <rect x="1048" y="578" width="192" height="112" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="1070" y="614" fill="#991b1b" font-size="18" font-weight="700">Lücken</text>
    <text x="1070" y="644" fill="#b91c1c" font-size="13">nachgefragt statt</text>
    <text x="1070" y="663" fill="#b91c1c" font-size="13">erfunden</text>
  </g>
</svg>
