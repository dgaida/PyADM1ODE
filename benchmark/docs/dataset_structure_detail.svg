<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1280" height="720" fill="#f1f5f9"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1280" height="62" fill="#0f172a"/>
  <rect x="0" y="0" width="8" height="62" fill="#38bdf8"/>
  <text x="36" y="40" fill="#ffffff" font-size="24" font-weight="700">Benchmark-Datenpunkt — Input und Vergleich</text>

  <!-- ===================== LEFT: INPUT ===================== -->
  <rect x="24" y="80" width="576" height="616" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="24" y="80" width="576" height="38" rx="12" fill="#1e3a8a"/>
  <rect x="24" y="99" width="576" height="19" fill="#1e3a8a"/>
  <text x="46" y="105" fill="#ffffff" font-size="16" font-weight="700">Input — Aufbau der Aufgabe</text>

  <!-- modalität -->
  <text x="46" y="146" fill="#64748b" font-size="12" font-weight="700" letter-spacing="0.5">MODALITÄT</text>
  <g font-size="13.5" text-anchor="middle">
    <rect x="46"  y="154" width="62"  height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="77"  y="172" fill="#1e40af">Text</text>
    <rect x="114" y="154" width="92"  height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="160" y="172" fill="#1e40af">Bild / Foto</text>
    <rect x="212" y="154" width="72"  height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="248" y="172" fill="#1e40af">Skizze</text>
    <rect x="294" y="154" width="68"  height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="328" y="172" fill="#1e40af">Hybrid</text>
  </g>

  <!-- sprache -->
  <text x="46" y="206" fill="#64748b" font-size="12" font-weight="700" letter-spacing="0.5">SPRACHE</text>
  <g font-size="13.5" text-anchor="middle">
    <rect x="46"  y="214" width="84" height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="88"  y="232" fill="#1e40af">Deutsch</text>
    <rect x="138" y="214" width="84" height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="180" y="232" fill="#1e40af">Englisch</text>
  </g>

  <!-- detailgrad -->
  <text x="46" y="266" fill="#64748b" font-size="12" font-weight="700" letter-spacing="0.5">DETAILGRAD</text>
  <g font-size="13.5" text-anchor="middle">
    <rect x="46"  y="274" width="108" height="26" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/><text x="100" y="292" fill="#065f46">vollständig</text>
    <rect x="162" y="274" width="240" height="26" rx="6" fill="#fff7ed" stroke="#fed7aa"/><text x="282" y="292" fill="#9a3412">unterspezifiziert (Werte fehlen)</text>
  </g>

  <!-- inhalt -->
  <text x="46" y="326" fill="#64748b" font-size="12" font-weight="700" letter-spacing="0.5">INHALT (BEISPIEL)</text>
  <rect x="46" y="334" width="508" height="80" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="64" y="358" fill="#334155" font-size="13.5" font-style="italic">„Zwei Fermenter (6×28 m), ein Nachgärer,</text>
  <text x="64" y="378" fill="#334155" font-size="13.5" font-style="italic">Gärrestlager, Separator, Gasfackel, BHKW —</text>
  <text x="64" y="398" fill="#334155" font-size="13.5" font-style="italic">güllebasiert, Mengen unbekannt."</text>

  <!-- varianten je anlage -->
  <text x="46" y="442" fill="#64748b" font-size="12" font-weight="700" letter-spacing="0.5">VARIANTEN JE ANLAGE (ROBUSTHEIT)</text>
  <g font-size="13" text-anchor="middle" fill="#3730a3">
    <rect x="46"  y="450" width="160" height="26" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="126" y="468">Sprache (de / en)</text>
    <rect x="214" y="450" width="180" height="26" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="304" y="468">knapp ↔ ausführlich</text>
    <rect x="46"  y="484" width="170" height="26" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="131" y="502">Text ↔ Bild / Skizze</text>
    <rect x="224" y="484" width="190" height="26" rx="6" fill="#eef2ff" stroke="#c7d2fe"/><text x="319" y="502">Irrelevante Zusatzangaben</text>
  </g>

  <!-- obligation -->
  <text x="46" y="548" fill="#64748b" font-size="12" font-weight="700" letter-spacing="0.5">BEWERTUNGS-KATEGORIEN PRO FELD</text>
  <g font-size="13.5">
    <rect x="46"  y="558" width="16" height="16" rx="3" fill="#16a34a"/><text x="70"  y="571" fill="#334155"><tspan font-weight="700">gegeben</tspan> — im Input</text>
    <rect x="300" y="558" width="16" height="16" rx="3" fill="#2563eb"/><text x="324" y="571" fill="#334155"><tspan font-weight="700">ableitbar</tspan> — berechnet</text>
    <rect x="46"  y="586" width="16" height="16" rx="3" fill="#dc2626"/><text x="70"  y="599" fill="#334155"><tspan font-weight="700">nachfragen</tspan> — fehlt</text>
    <rect x="300" y="586" width="16" height="16" rx="3" fill="#6b7280"/><text x="324" y="599" fill="#334155"><tspan font-weight="700">automatisch</tspan> — Package</text>
  </g>
  <rect x="46" y="620" width="508" height="56" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="64" y="643" fill="#9a3412" font-size="13" font-weight="700">Fehlt ein Wert:</text>
  <text x="64" y="664" fill="#b45309" font-size="13">System fragt nach — mit realistischem Vorschlag (Akzeptanzband statt Punktwert).</text>

  <!-- ===================== RIGHT: VERGLEICH ===================== -->
  <rect x="624" y="80" width="632" height="452" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="624" y="80" width="632" height="38" rx="12" fill="#0f172a"/>
  <rect x="624" y="99" width="632" height="19" fill="#0f172a"/>
  <text x="646" y="105" fill="#ffffff" font-size="16" font-weight="700">Vergleich — Ablauf (Bewertung)</text>

  <g>
    <!-- step 1 -->
    <circle cx="664" cy="158" r="15" fill="#1e3a8a"/><text x="664" y="163" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">1</text>
    <text x="694" y="153" fill="#0f172a" font-size="15.5" font-weight="700">Code ausführen</text>
    <text x="694" y="172" fill="#64748b" font-size="13">Sandbox + Timeout → Anlage entsteht</text>
    <!-- step 2 -->
    <circle cx="664" cy="218" r="15" fill="#1e3a8a"/><text x="664" y="223" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">2</text>
    <text x="694" y="213" fill="#0f172a" font-size="15.5" font-weight="700">Anlage auslesen</text>
    <text x="694" y="232" fill="#64748b" font-size="13">to_dict() → typisierter Graph</text>
    <!-- step 3 -->
    <circle cx="664" cy="278" r="15" fill="#10b981"/><text x="664" y="283" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">3</text>
    <text x="694" y="273" fill="#0f172a" font-size="15.5" font-weight="700">Bauteile nach Typ zuordnen</text>
    <text x="694" y="292" fill="#64748b" font-size="13">Namen egal</text>
    <!-- step 4 -->
    <circle cx="664" cy="338" r="15" fill="#d97706"/><text x="664" y="343" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">4</text>
    <text x="694" y="333" fill="#0f172a" font-size="15.5" font-weight="700">Parameter im Akzeptanzband</text>
    <text x="694" y="352" fill="#64748b" font-size="13">Akzeptanzband statt Punktwert (z. B. V_liq, V_gas, T)</text>
    <!-- step 5 -->
    <circle cx="664" cy="398" r="15" fill="#10b981"/><text x="664" y="403" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">5</text>
    <text x="694" y="393" fill="#0f172a" font-size="15.5" font-weight="700">Verbindungen als Graph prüfen</text>
    <text x="694" y="412" fill="#64748b" font-size="13">Kanten: Flüssig · Gas · Wärme</text>
    <!-- step 6 -->
    <circle cx="664" cy="458" r="15" fill="#dc2626"/><text x="664" y="463" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">6</text>
    <text x="694" y="453" fill="#0f172a" font-size="15.5" font-weight="700">Fehlende Werte prüfen</text>
    <text x="694" y="472" fill="#64748b" font-size="13">Wurde nachgefragt — statt still geraten?</text>
  </g>

  <!-- ===================== RIGHT BOTTOM: SCORES ===================== -->
  <text x="624" y="560" fill="#64748b" font-size="13" font-weight="700" letter-spacing="0.5">ERGEBNIS — DREI SCORES</text>
  <g>
    <rect x="624" y="572" width="200" height="104" rx="10" fill="#ecfdf5" stroke="#10b981"/>
    <text x="644" y="600" fill="#065f46" font-size="16" font-weight="700">Struktur</text>
    <text x="644" y="624" fill="#047857" font-size="12.5">Bauteile &amp;</text>
    <text x="644" y="641" fill="#047857" font-size="12.5">Verbindungen</text>
    <text x="644" y="658" fill="#047857" font-size="12.5">korrekt?</text>

    <rect x="840" y="572" width="200" height="104" rx="10" fill="#fffbeb" stroke="#d97706"/>
    <text x="860" y="600" fill="#92400e" font-size="16" font-weight="700">Maße</text>
    <text x="860" y="624" fill="#b45309" font-size="12.5">Volumen &amp;</text>
    <text x="860" y="641" fill="#b45309" font-size="12.5">Temperatur</text>
    <text x="860" y="658" fill="#b45309" font-size="12.5">im Band?</text>

    <rect x="1056" y="572" width="200" height="104" rx="10" fill="#fef2f2" stroke="#dc2626"/>
    <text x="1076" y="600" fill="#991b1b" font-size="16" font-weight="700">Fehlende Werte</text>
    <text x="1076" y="624" fill="#b91c1c" font-size="12.5">nachgefragt —</text>
    <text x="1076" y="641" fill="#b91c1c" font-size="12.5">statt erfunden?</text>
  </g>
</svg>
