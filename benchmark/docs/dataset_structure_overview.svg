<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aP" markerWidth="11" markerHeight="11" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="#f1f5f9"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1280" height="66" fill="#0f172a"/>
  <rect x="0" y="0" width="8" height="66" fill="#38bdf8"/>
  <text x="36" y="42" fill="#ffffff" font-size="26" font-weight="700">Benchmark — Überblick</text>

  <!-- 3-STAGE FLOW -->
  <g text-anchor="middle">
    <rect x="36" y="150" width="356" height="140" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="214" y="212" fill="#1e3a8a" font-size="24" font-weight="700">Input</text>
    <text x="214" y="246" fill="#1e40af" font-size="16">Bild oder Beschreibung</text>

    <line x1="392" y1="220" x2="450" y2="220" stroke="#475569" stroke-width="3" marker-end="url(#aP)"/>

    <rect x="452" y="150" width="356" height="140" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="630" y="212" fill="#0f172a" font-size="24" font-weight="700">LMM baut Anlage</text>
    <text x="630" y="246" fill="#475569" font-size="16">erzeugt PyADM1ODE-Code</text>

    <line x1="808" y1="220" x2="866" y2="220" stroke="#475569" stroke-width="3" marker-end="url(#aP)"/>

    <rect x="868" y="150" width="356" height="140" rx="14" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="1046" y="212" fill="#155e75" font-size="24" font-weight="700">Vergleich</text>
    <text x="1046" y="246" fill="#0e7490" font-size="16">mit der Soll-Anlage</text>
  </g>

  <!-- SCORES -->
  <text x="36" y="356" fill="#64748b" font-size="15" font-weight="700" letter-spacing="1">GEPRÜFT WIRD IN DREI SCORES</text>
  <g>
    <rect x="36" y="372" width="384" height="150" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="60" y="426" fill="#065f46" font-size="22" font-weight="700">Struktur</text>
    <text x="60" y="462" fill="#047857" font-size="16">Bauteile und Verbindungen</text>
    <text x="60" y="486" fill="#047857" font-size="16">korrekt?</text>

    <rect x="448" y="372" width="384" height="150" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <text x="472" y="426" fill="#92400e" font-size="22" font-weight="700">Maße</text>
    <text x="472" y="462" fill="#b45309" font-size="16">Volumen und Temperatur</text>
    <text x="472" y="486" fill="#b45309" font-size="16">im Toleranzbereich?</text>

    <rect x="860" y="372" width="384" height="150" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="884" y="426" fill="#991b1b" font-size="22" font-weight="700">Fehlende Werte</text>
    <text x="884" y="462" fill="#b91c1c" font-size="16">nachgefragt —</text>
    <text x="884" y="486" fill="#b91c1c" font-size="16">statt erfunden?</text>
  </g>

  <!-- TAKEAWAY -->
  <rect x="36" y="572" width="1208" height="64" rx="12" fill="#0f172a"/>
  <text x="640" y="612" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Kernfrage: Baut der erzeugte Code dieselbe Anlage wie vorgesehen?</text>
</svg>
