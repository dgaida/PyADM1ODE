site_name: PyADM1ODE
site_description: Python framework for modeling, simulating, and optimizing agricultural biogas plants
site_author: Daniel Gaida
site_url: https://dgaida.github.io/PyADM1ODE/

repo_name: dgaida/PyADM1ODE
repo_url: https://github.com/dgaida/PyADM1ODE
edit_uri: edit/master/docs/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - content.tabs.link

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: de
          name: Deutsch
          default: true
        - locale: en
          name: English
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
  - mermaid2:
      arguments:
        theme: 'default'
  - mike:
      version_selector: true
  - autorefs

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Erste Schritte:
      - Installation: user_guide/installation.md
      - Schnellstart: user_guide/quickstart.md
  - Dokumentation:
      - Komponenten:
          - Übersicht: user_guide/components/index.md
          - Biologisch: user_guide/components/biological.md
          - Energie: user_guide/components/energy.md
          - Fütterung: user_guide/components/feeding.md
          - Mechanisch: user_guide/components/mechanical.md
          - Sensoren: user_guide/components/sensors.md
      - Beispiele:
          - Basis-Fermenter: examples/basic_digester.md
          - Zweistufige Anlage: examples/two_stage_plant.md
          - Parallele Simulation: examples/parallel_simulation.md
      - Architektur: architecture/index.md
      - Entwicklung:
          - Styleguide: development/style_guide.md
  - Fehlerbehebung: user_guide/troubleshooting.md
  - Metriken: metrics.md
  - Changelog: CHANGELOG.md
  - API-Referenz:
      - Core: api/core.md
      - Biologisch: api/biological.md
      - Energie: api/energy.md
      - Mechanisch: api/mechanical.md
      - Fütterung: api/feeding.md
      - Konfigurator: api/configurator.md
      - Simulation: api/simulation.md
      - Substrate: api/substrates.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dgaida/PyADM1ODE
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/PyADM1ODE/

copyright: Copyright &copy; 2026 Daniel Gaida
