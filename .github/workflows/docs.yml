name: Documentation

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev,docs]"
          pip install mkdocs-material mkdocs-static-i18n "mkdocstrings[python]" mkdocs-mermaid2-plugin mike mkdocs-autorefs interrogate git-cliff

      - name: Install Mono (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete
          mono --version

      - name: Check API Doc Coverage
        run: |
          interrogate pyadm1

      - name: Generate Changelog
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git-cliff --output CHANGELOG.md

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Deploy Versioned Documentation
        if: github.event_name == 'push'
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            mike deploy --push --update-aliases $VERSION latest
          elif [[ $GITHUB_REF == refs/heads/master ]]; then
            mike deploy --push --update-aliases dev latest
          fi
          mike set-default latest --push

      - name: Build Documentation (PR check)
        if: github.event_name == 'pull_request'
        run: |
          mkdocs build --strict
