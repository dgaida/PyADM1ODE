name: Auto Versioning

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bump auxiliary files
        id: bump
        run: python scripts/bump_version.py --no-pyproject

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ steps.bump.outputs.new_version }}
          outputPath: CHANGELOG.md

      - name: Sync Changelogs
        run: |
          for lang in en de; do
            if [ -d "docs/$lang" ]; then
              cp CHANGELOG.md "docs/$lang/CHANGELOG.md"
            fi
          done

      - name: Stage auxiliary changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add modified files, ignore those that don't exist
          FILES="pyadm1/__version__.py tests/__init__.py CHANGELOG.md docs/en/metrics.md docs/de/metrics.md docs/en/CHANGELOG.md docs/de/CHANGELOG.md"
          for f in $FILES; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done

      - name: Auto Version and Badges
        uses: dgaida/auto-version-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-version: true
          create-badge: true
